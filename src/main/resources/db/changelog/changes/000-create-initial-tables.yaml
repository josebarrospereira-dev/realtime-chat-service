databaseChangeLog:
  - changeSet:
      id: 000-create-users-table
      author: jose
      preConditions:
        - onFail: MARK_RAN
          not:
            tableExists:
              tableName: users
      changes:
        - createTable:
            tableName: users
            columns:
              - column:
                  name: id
                  type: bigint
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: username
                  type: varchar(255)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: password
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: role
                  type: varchar(50)
                  constraints:
                    nullable: false

  - changeSet:
      id: 000-create-messages-table
      author: jose
      preConditions:
        - onFail: MARK_RAN
          not:
            tableExists:
              tableName: messages
      changes:
        - createTable:
            tableName: messages
            columns:
              - column:
                  name: id
                  type: bigint
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: sender
                  type: varchar(255)
              - column:
                  name: content
                  type: text
              - column:
                  name: type
                  type: varchar(50)
              - column:
                  name: timestamp
                  type: timestamp
