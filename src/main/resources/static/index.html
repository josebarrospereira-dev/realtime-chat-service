<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Chat</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.5.0/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: sans-serif;
            background: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        /* AUTH */
        #auth-page {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.1);
            width: 320px;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        #auth-page h2 { text-align: center; color: #333; }

        #auth-page input {
            width: 100%;
            padding: 0.6rem 0.8rem;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 0.95rem;
        }

        #auth-page button {
            width: 100%;
            padding: 0.65rem;
            background: #4f46e5;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 0.95rem;
            cursor: pointer;
        }

        #auth-page button:hover { background: #4338ca; }

        #auth-toggle {
            text-align: center;
            font-size: 0.85rem;
            color: #555;
        }

        #auth-toggle span {
            color: #4f46e5;
            cursor: pointer;
            font-weight: bold;
        }

        #auth-toggle span:hover { text-decoration: underline; }

        #auth-error {
            color: #dc2626;
            font-size: 0.85rem;
            text-align: center;
            min-height: 1rem;
        }

        /* CHAT */
        #chat-page {
            display: none;
            flex-direction: column;
            width: 480px;
            height: 600px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        #chat-header {
            background: #4f46e5;
            color: white;
            padding: 1rem 1.2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        #chat-header span { font-size: 0.85rem; opacity: 0.85; }

        #logout-btn {
            background: transparent;
            border: 1px solid rgba(255,255,255,0.5);
            color: white;
            padding: 0.3rem 0.7rem;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.8rem;
        }

        #logout-btn:hover { background: rgba(255,255,255,0.15); }

        #messageArea {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            list-style: none;
        }

        #messageArea li {
            background: #f0f2f5;
            padding: 0.5rem 0.8rem;
            border-radius: 8px;
            font-size: 0.9rem;
            max-width: 85%;
            word-break: break-word;
        }

        #messageArea li.own {
            background: #e0e7ff;
            align-self: flex-end;
        }

        #messageArea li.system {
            background: transparent;
            color: #888;
            font-size: 0.8rem;
            align-self: center;
        }

        #chat-input {
            display: flex;
            padding: 0.8rem;
            gap: 0.5rem;
            border-top: 1px solid #eee;
        }

        #chat-input input {
            flex: 1;
            padding: 0.6rem 0.8rem;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 0.9rem;
        }

        #chat-input button {
            padding: 0.6rem 1rem;
            background: #4f46e5;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
        }

        #chat-input button:hover { background: #4338ca; }
    </style>
</head>
<body>

    <!-- AUTH -->
    <div id="auth-page">
        <h2 id="auth-title">Entrar</h2>
        <input type="text" id="auth-username" placeholder="Usuário" />
        <input type="password" id="auth-password" placeholder="Senha" />
        <button id="auth-btn" onclick="submitAuth()">Entrar</button>
        <div id="auth-error"></div>
        <div id="auth-toggle">
            <span id="auth-toggle-link" onclick="toggleMode()">Não tem conta? Cadastre-se</span>
        </div>
    </div>

    <!-- CHAT -->
    <div id="chat-page">
        <div id="chat-header">
            <div>
                <strong>Chat</strong><br>
                <span id="chat-username"></span>
            </div>
            <button id="logout-btn" onclick="logout()">Sair</button>
        </div>
        <ul id="messageArea"></ul>
        <div id="chat-input">
            <input type="text" id="message" placeholder="Digite uma mensagem..." onkeydown="if(event.key==='Enter') sendMessage()" />
            <button onclick="sendMessage()">Enviar</button>
        </div>
    </div>

    <script>
        let stompClient = null;
        let isRegisterMode = false;

        function toggleMode() {
            isRegisterMode = !isRegisterMode;
            document.getElementById('auth-title').textContent = isRegisterMode ? 'Cadastrar' : 'Entrar';
            document.getElementById('auth-btn').textContent = isRegisterMode ? 'Cadastrar' : 'Entrar';
            document.getElementById('auth-toggle-link').textContent = isRegisterMode
                ? 'Já tem conta? Entrar'
                : 'Não tem conta? Cadastre-se';
            document.getElementById('auth-error').textContent = '';
        }

        async function submitAuth() {
            const username = document.getElementById('auth-username').value.trim();
            const password = document.getElementById('auth-password').value;
            const errorEl = document.getElementById('auth-error');
            errorEl.textContent = '';

            if (!username || !password) {
                errorEl.textContent = 'Preencha todos os campos.';
                return;
            }

            if (isRegisterMode) {
                const res = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                if (res.status === 201) {
                    toggleMode();
                    errorEl.style.color = '#16a34a';
                    errorEl.textContent = 'Conta criada! Faça login.';
                } else if (res.status === 409) {
                    errorEl.style.color = '#dc2626';
                    errorEl.textContent = 'Usuário já existe.';
                } else {
                    errorEl.style.color = '#dc2626';
                    errorEl.textContent = 'Erro ao cadastrar.';
                }
                return;
            }

            const res = await fetch('/api/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });

            if (res.ok) {
                const data = await res.json();
                sessionStorage.setItem('token', data.token);
                sessionStorage.setItem('username', username);
                showChat(username, data.token);
            } else {
                errorEl.style.color = '#dc2626';
                errorEl.textContent = 'Usuário ou senha inválidos.';
            }
        }

        function showChat(username, token) {
            document.getElementById('auth-page').style.display = 'none';
            const chatPage = document.getElementById('chat-page');
            chatPage.style.display = 'flex';
            document.getElementById('chat-username').textContent = username;
            connect(token);
        }

        function connect(token) {
            const socket = new SockJS('/api/ws-chat');
            stompClient = Stomp.over(socket);
            stompClient.debug = null;

            stompClient.connect({ 'Authorization': 'Bearer ' + token }, function () {
                stompClient.subscribe('/topic/public', function (payload) {
                    showMessage(JSON.parse(payload.body));
                });
            }, function () {
                logout();
            });
        }

        function sendMessage() {
            const input = document.getElementById('message');
            const content = input.value.trim();
            if (!content || !stompClient) return;

            stompClient.send('/app/chat.sendMessage', {}, JSON.stringify({
                sender: sessionStorage.getItem('username'),
                content,
                type: 'CHAT'
            }));
            input.value = '';
        }

        function showMessage(message) {
            const list = document.getElementById('messageArea');
            const li = document.createElement('li');
            const currentUser = sessionStorage.getItem('username');

            if (message.type === 'JOIN' || message.type === 'LEAVE') {
                li.className = 'system';
                li.textContent = message.type === 'JOIN'
                    ? `${message.sender} entrou no chat`
                    : `${message.sender} saiu do chat`;
            } else {
                li.className = message.sender === currentUser ? 'own' : '';
                li.textContent = message.sender === currentUser
                    ? message.content
                    : `${message.sender}: ${message.content}`;
            }

            list.appendChild(li);
            list.scrollTop = list.scrollHeight;
        }

        function logout() {
            if (stompClient) stompClient.disconnect();
            sessionStorage.clear();
            location.reload();
        }
    </script>
</body>
</html>
